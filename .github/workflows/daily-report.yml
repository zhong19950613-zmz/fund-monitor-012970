name: Daily Fund Report

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00 自动运行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report and update summary
        env:
          SCKEY: ${{ secrets.SCKEY }}   # 可选：配置后自动微信推送
        run: python scripts/generate_report.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ portfolio-summary.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily fund report update $(date +%Y-%m-%d)"
            git push
          fi
