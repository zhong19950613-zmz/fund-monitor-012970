name: Daily Fund Monitor Report

on:
  schedule:
    # 北京时间每日 09:00 执行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run analysis
        run: |
          python -c "
          import yaml
          import json
          from datetime import datetime

          # 读取 holdings
          with open('holdings.yaml', 'r', encoding='utf-8') as f:
              holdings = yaml.safe_load(f)

          # 简单分析示例
          print('=== Daily Fund Report ===')
          print(f'Date: {datetime.now().strftime("%Y-%m-%d %H:%M")}')
          print(f'Holdings loaded: {len(holdings.get("holdings", []))} items')
          print('Analysis placeholder - integrate with real logic later')
          "

      - name: Generate report
        run: |
          echo "# Daily Fund Report - $(date +%Y-%m-%d)" > reports/daily-$(date +%Y-%m-%d).md
          echo "## Summary" >> reports/daily-$(date +%Y-%m-%d).md
          echo "Auto-generated by GitHub Actions" >> reports/daily-$(date +%Y-%m-%d).md

      - name: Commit report
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add reports/ || true
          git commit -m "chore: daily report $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "Push skipped"