name: SPCX Minimal Monitor

on:
  schedule:
    - cron: '0 2 * * *'  # 每日北京时10:00（江市6月12日后自动生效）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  spcx-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pyyaml

      - name: Run SPCX monitor
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: python scripts/spcx_monitor.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/spcx_latest.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: SPCX price update $(date +%Y-%m-%d)"
            git push
          fi
