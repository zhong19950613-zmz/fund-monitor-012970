name: Daily Fund Monitor

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh secrets'
        required: false
        default: 'true'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Debug secrets
      run: |
        echo "SERVERCHAN_KEY length: ${{ secrets.SERVERCHAN_KEY != '' && 'SET' || 'NOT SET' }}"

    - name: Run monitor
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        TO_EMAIL: ${{ secrets.TO_EMAIL }}
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      run: node index.js
