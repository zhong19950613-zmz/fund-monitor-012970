name: Daily Analysis & Report

on:
  schedule:
    # 北京时间每日 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run analysis
        run: python scripts/analyze.py

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git commit -m "chore: daily analysis report $(date +%Y-%m-%d)" || echo "No changes"
          git push || echo "Push may have failed"